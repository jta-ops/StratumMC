name: Build Stratum

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Configure git identity
        run: |
          git config --global user.name "Stratum CI"
          git config --global user.email "ci@stratum.mc"

      - name: Apply patches
        run: ./gradlew applyPatches
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Build server
        run: ./gradlew build createPaperclipJar
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Build StratumBootstrap plugin
        run: ./gradlew :StratumBootstrap:jar
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp paper-server/build/libs/*-paperclip-*.jar dist/Stratum.jar
          cp StratumBootstrap/build/libs/StratumBootstrap-*.jar dist/StratumBootstrap.jar
          echo "Build #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" > dist/build-info.txt
          sha256sum dist/Stratum.jar dist/StratumBootstrap.jar >> dist/build-info.txt

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: Stratum
          path: dist/Stratum.jar
          retention-days: 30

      - name: Upload StratumBootstrap plugin
        uses: actions/upload-artifact@v4
        with:
          name: StratumBootstrap
          path: dist/StratumBootstrap.jar
          retention-days: 30

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.txt
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            **Stratum MC** — High-performance Minecraft server software built on Paper.

            ### Installation
            ```bash
            curl stratumserver.net/cli | bash
            ```

            ### Files
            - `Stratum.jar` — Server software (drop-in Paper replacement)
            - `StratumBootstrap.jar` — Bootstrap plugin (auto-installed on startup)
          files: |
            dist/Stratum.jar
            dist/StratumBootstrap.jar
            dist/build-info.txt
          generate_release_notes: false
          prerelease: false
