name: Build Stratum

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (MC ${{ matrix.mc-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc-version:
          - "26.1.2"
          - "1.21.5"
          - "1.21.6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Apply patches
        run: ./gradlew applyPatches
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Build
        run: ./gradlew build createPaperclipJar
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_STARTED_AT: ${{ github.event.repository.updated_at }}

      - name: Upload paperclip JAR
        uses: actions/upload-artifact@v4
        with:
          name: stratum-${{ matrix.mc-version }}-paperclip
          path: paper-server/build/libs/*-paperclip-*.jar
          retention-days: 30

      - name: Upload launcher JAR
        uses: actions/upload-artifact@v4
        with:
          name: stratum-launcher
          path: stratum-launcher/build/libs/stratum-launcher.jar
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build release artifacts
        run: ./gradlew applyPatches build createPaperclipJar
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Sign JAR (Ed25519)
        run: |
          if [ -f "$SIGN_KEY_PATH" ]; then
            JAR=$(find paper-server/build/libs -name "*-paperclip-*.jar" | head -1)
            openssl pkeyutl -sign -inkey "$SIGN_KEY_PATH" -rawin -in "$JAR" | base64 > "${JAR}.sig"
            echo "Signed: $JAR"
          else
            echo "No signing key found — skipping signature"
          fi
        env:
          SIGN_KEY_PATH: /tmp/stratum_private.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            paper-server/build/libs/*-paperclip-*.jar
            paper-server/build/libs/*-paperclip-*.jar.sig
          generate_release_notes: true
