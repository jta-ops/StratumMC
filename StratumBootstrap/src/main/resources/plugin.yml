name: StratumBootstrap
version: '2.1.0'
main: mc.stratum.bootstrap.StratumBootstrap
api-version: '1.21'
load: STARTUP
description: Stratum license verification and bootstrap plugin
website: https://stratumserver.net

commands:
  stb:
    description: Stratum Bootstrap management
    usage: /stb [license|version|stats|restart|ai|gui]
    permission: stratum.admin
    permission-message: ''

permissions:
  stratum.admin:
    description: Full Stratum admin access
    default: op
  stratum.ai:
    description: AI assistant access
    default: op